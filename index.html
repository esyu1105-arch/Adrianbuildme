    <style>
        :root {

            --gold:    #d97706;

            --gold-bd: #fbbf24;
        }
        body {
            font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
            background-color: var(--cream);
            background-image:
                radial-gradient(ellipse at 10% 0%, #fef3c755 0%, transparent 50%),

        }
        .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--amber-lt); border-radius: 99px; }
        .task-card { transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        .task-active {
            border-color: var(--amber) !important;
            background-color: #fffbeb !important;
            box-shadow: 0 8px 24px -4px rgba(245,158,11,0.15);
            transform: scale(1.012);
        }
        .task-urgent {
            border-color: var(--gold-bd) !important;
            background: linear-gradient(135deg, var(--gold-lt) 0%, #fffbf0 100%) !important;
        }
        .task-active.task-urgent {
            border-color: var(--gold) !important;
            box-shadow: 0 8px 24px -4px rgba(217,119,6,0.2);
        }
        #time-progress-bar {
            background: linear-gradient(90deg, #fbbf24, #f59e0b, #d97706);
            background-size: 200% 100%;
            animation: shimmer 3s ease infinite;
        }
        @keyframes shimmer {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .day-divider {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-divider::before,
        .day-divider::after {
            content: '';
            flex: 1;
            height: 1px;

    const START_TIME = new Date("2026-05-23T21:00:00+08:00").getTime();
    const END_TIME   = new Date("2026-05-24T23:30:00+08:00").getTime();

    // Cream-Yellow / Amber Theme mapping
    const CREW_COLORS = {
        amber:  { active:"bg-amber-500 text-white border-amber-500",   inactive:"bg-white text-slate-600 border-slate-200 hover:bg-amber-50 hover:border-amber-200 hover:text-amber-600" },
        orange: { active:"bg-orange-500 text-white border-orange-500", inactive:"bg-white text-slate-600 border-slate-200 hover:bg-orange-50 hover:border-orange-200 hover:text-orange-600" }
    };
    const PROFILE_COLORS = {
        amber:  { badge:"bg-amber-50 text-amber-700 border-amber-200",   icon:"bg-amber-50 border-amber-100 text-amber-500",   card:"border-amber-100" },
        orange: { badge:"bg-orange-50 text-orange-700 border-orange-200", icon:"bg-orange-50 border-orange-100 text-orange-500", card:"border-orange-100" }
    };

    let currentCrew = localStorage.getItem('sister_active_crew') || 'amy';
    let debugTimeOffset = 0, isDebugMode = false;

    const timeFormatter = new Intl.DateTimeFormat('en-US', {
        timeZone:'Asia/Hong_Kong', hour12:false,
        hour:'2-digit', minute:'2-digit', second:'2-digit'
    });
    const dateFormatter = new Intl.DateTimeFormat('zh-HK', {
        timeZone:'Asia/Hong_Kong', month:'long', day:'numeric', weekday:'short'
    });

    function parseTaskTime(dateStr, timeStr) {
        return new Date(`${dateStr}T${timeStr}:00+08:00`).getTime();
    }

    window.switchCrew = function(key) {
        currentCrew = key;
        localStorage.setItem('sister_active_crew', key);
        const data = CREW_DATA[key];
        const cc   = CREW_COLORS[data.color];
        const pc   = PROFILE_COLORS[data.color];

        document.querySelectorAll('.crew-btn').forEach(btn => {
            const k = btn.id.replace('crew-','');
            const c = CREW_COLORS[CREW_DATA[k].color];
            btn.className = `crew-btn shrink-0 px-3.5 py-2 text-xs font-bold rounded-xl border snap-start transition-all ${c.inactive}`;
        });
        const ab = document.getElementById(`crew-${key}`);
        if (ab) ab.className = `crew-btn shrink-0 px-3.5 py-2 text-xs font-bold rounded-xl border snap-start transition-all ${cc.active}`;

        document.getElementById('profile-name').textContent  = data.name;
        document.getElementById('profile-title').textContent = data.title;
        const badge = document.getElementById('profile-badge');
        badge.textContent = data.role;
        badge.className   = `text-[10px] font-black px-2.5 py-0.5 rounded-full border shrink-0 ${pc.badge}`;
        document.getElementById('profile-icon').className    = `fa-solid ${data.icon} text-sm`;
        document.getElementById('profile-icon-wrap').className = `rounded-xl p-2.5 border shrink-0 ${pc.icon}`;
        document.getElementById('crew-profile').className   = `bg-white rounded-2xl px-4 py-3 border shadow-sm flex items-center gap-3 ${pc.card}`;

        renderTimeline();
        tick();
    };

    function renderTimeline() {
        const container = document.getElementById('timeline-container');
        container.innerHTML = '';
        const data = CREW_DATA[currentCrew];
        let lastDate = '';

        data.timeline.forEach((task, idx) => {
            if (task.date !== lastDate) {
                const label = task.date === '2026-05-23'
                    ? '🌙 5月23日 · 星期六 · 前哨夜'
                    : '💍 5月24日 · 星期日 · 大婚正日';
                container.insertAdjacentHTML('beforeend', `
                    <div class="day-divider py-1 ${idx===0?'':'mt-2'}">
                        <span class="font-display italic text-[11px] font-bold text-amber-500 whitespace-nowrap tracking-wide">${label}</span>
                    </div>`);
                lastDate = task.date;
            }

            const tagEl = task.tag
                ? `<span class="text-[10px] bg-amber-50 text-amber-600 px-2 py-0.5 rounded-full font-semibold border border-amber-100 leading-none">${task.tag}</span>`
                : '';
            const urgentEl = task.urgent
                ? `<span class="text-[10px] bg-orange-50 text-orange-600 px-2 py-0.5 rounded-full font-bold border border-orange-200 leading-none">⚡ 關鍵</span>`
                : '';
            const matEl = task.materials
                ? `<div class="mt-2 bg-orange-50 border border-orange-100 rounded-lg px-2.5 py-1.5 flex items-start gap-1.5">
                       <i class="fa-solid fa-briefcase text-orange-500 text-[9px] mt-0.5 shrink-0"></i>
                       <span class="text-[10px] text-orange-700 font-semibold leading-snug">備料：${task.materials}</span>
                   </div>`
                : '';

            const timeRange = `${task.start} – ${task.end}`;
            const urgentCard = task.urgent ? 'task-urgent' : '';

            container.insertAdjacentHTML('beforeend', `
                <div class="task-card bg-white rounded-xl p-3.5 shadow-sm border border-slate-100 ${urgentCard} relative"
                     data-date="${task.date}" data-start="${task.start}" data-end="${task.end}" id="task-idx-${idx}">
                    <div class="absolute -left-[1.45rem] top-4 w-3 h-px bg-amber-200"></div>
                    <div class="flex items-start gap-2">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start gap-2 flex-wrap">
                                <span class="task-title font-bold text-sm text-slate-800 leading-snug">${task.title}</span>
                                <span class="time-badge shrink-0 text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-100 text-slate-500 transition-colors tabular-nums">${timeRange}</span>
                            </div>
                            <p class="text-xs text-slate-500 mt-1 leading-relaxed">${task.desc}</p>
                            ${(tagEl||urgentEl) ? `<div class="mt-2 flex flex-wrap gap-1">${tagEl}${urgentEl}</div>` : ''}
                            ${matEl}
                        </div>
                    </div>
                </div>`);
        });
    }

    function tick() {
        const now = Date.now() + debugTimeOffset;
        const nowDate = new Date(now);

        if (isDebugMode) {
            document.getElementById('live-clock').innerHTML = `<span style="color:#f59e0b">${timeFormatter.format(nowDate)}</span>`;
            document.getElementById('clock-label').textContent = `模擬時間 · ${dateFormatter.format(nowDate)}`;
        } else {
            document.getElementById('live-clock').textContent = timeFormatter.format(nowDate);
            document.getElementById('clock-label').textContent = `當前香港時間 · ${dateFormatter.format(nowDate)}`;
        }

        let pct = 0;
        if (now >= END_TIME) pct = 100;
        else if (now > START_TIME) pct = ((now - START_TIME) / (END_TIME - START_TIME)) * 100;
        document.getElementById('progress-percentage').textContent = `${Math.floor(pct)}%`;
        document.getElementById('time-progress-bar').style.width = `${pct}%`;

        let activeFound = false, activeName = '';
        const data = CREW_DATA[currentCrew];
        const isOrange = data.color === 'orange';
        const bgActiveColor = isOrange ? 'bg-orange-500' : 'bg-amber-500';
        
        document.querySelectorAll('.task-card').forEach(card => {
            const start    = parseTaskTime(card.dataset.date, card.dataset.start);
            const end      = parseTaskTime(card.dataset.date, card.dataset.end);
            const isUrgent = card.classList.contains('task-urgent');
            const badge    = card.querySelector('.time-badge');

            card.classList.remove('task-active');
            badge.classList.remove('bg-amber-500','bg-orange-500','text-white');
            badge.classList.add('bg-slate-100','text-slate-500');

            if (now >= start && now < end) {
                card.classList.add('task-active');
                badge.classList.remove('bg-slate-100','text-slate-500');
                badge.classList.add(isUrgent ? 'bg-orange-500' : bgActiveColor, 'text-white');
                activeFound = true;
                activeName  = card.querySelector('.task-title').textContent;
            }
        });

        const dot = document.getElementById('active-dot');
        const ping = document.getElementById('active-ping');
        const status = document.getElementById('current-task-status');

        if (now < START_TIME) {
            dot.className    = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-slate-300';
            ping.classList.add('hidden');
            status.textContent = '等待大日子降臨...';
            status.className   = 'text-[11px] font-bold text-slate-400 truncate text-right';
        } else if (now >= END_TIME) {
            dot.className    = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500';
            ping.classList.add('hidden');
            status.textContent = '🎉 今日作戰順利，辛苦晒！';
            status.className   = 'text-[11px] font-bold text-emerald-600 truncate text-right';
        } else if (activeFound) {
            dot.className    = `relative inline-flex rounded-full h-2.5 w-2.5 ${isOrange ? 'bg-orange-500' : 'bg-amber-500'}`;
            ping.className   = `animate-ping absolute inline-flex h-full w-full rounded-full ${isOrange ? 'bg-orange-400' : 'bg-amber-400'} opacity-75`;
            ping.classList.remove('hidden');
            status.textContent = activeName;
            status.className   = `text-[11px] font-black ${isOrange ? 'text-orange-600' : 'text-amber-600'} truncate text-right`;
        } else {
            dot.className    = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-sky-400';
            ping.classList.add('hidden');
            status.textContent = '緩衝 / 待命中';
            status.className   = 'text-[11px] font-bold text-sky-600 truncate text-right';
        }
    }

    let clickCount = 0, clickTimer;
    document.getElementById('app-title').addEventListener('click', () => {
        clickCount++;
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        if (clickCount === 3) {
            clickCount = 0;
            const input = prompt('【姊妹團除錯模式】輸入模擬日期時間\n格式：MM-DD HH:MM（例：05-24 16:30）\n留空或取消即恢復真實時間：', '05-24 16:30');
            if (input && input.includes(' ') && input.includes(':')) {
                const [dp, tp] = input.split(' ');
                debugTimeOffset = parseTaskTime(`2026-${dp}`, tp) - Date.now();
                isDebugMode = true;
                tick();
                alert(`已模擬至 2026-${dp} ${tp} HKT`);
            } else {
                debugTimeOffset = 0; isDebugMode = false;
                tick(); alert('已恢復真實時間。');
            }
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        switchCrew(currentCrew);
        setInterval(tick, 1000);
    });
    </script>
</body>
</html>
